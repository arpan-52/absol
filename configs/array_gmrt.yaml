# GMRT array geometry. ENU metres relative to C02 (the GMRT reference antenna).
# Converted from the observatory Antenna.def local equatorial (bx, by, bz) frame
# (X -> meridian/equator intersection, Y -> east, Z -> NCP) at latitude 19.0963 N:
#   E = Y ;  N = -X sin(lat) + Z cos(lat) ;  U = X cos(lat) + Z sin(lat)
# The two mock entries in Antenna.def (ANT30 "C07", ANT31 "S05") are excluded:
# the real array is 30 antennas (no C07, no S05).
array:
  name: GMRT
  latitude_deg: 19.0963
  longitude_deg: 74.0500
  antennas:
    - {id: C00, e: 687.88, n: -21.21, u: 0.01}
    - {id: C01, e: 326.45, n: -42.46, u: -0.68}
    - {id: C02, e: 0.00, n: 0.00, u: 0.00}
    - {id: C03, e: -372.71, n: 142.99, u: -4.68}
    - {id: C04, e: -565.96, n: 133.33, u: -7.82}
    - {id: C05, e: 67.81, n: -258.90, u: -5.91}
    - {id: C06, e: -31.43, n: -231.75, u: -4.84}
    - {id: C08, e: 280.68, n: -421.09, u: -7.37}
    - {id: C09, e: 41.95, n: -159.21, u: -3.68}
    - {id: C10, e: -164.87, n: -617.76, u: -11.38}
    - {id: C11, e: -603.25, n: -337.39, u: -8.35}
